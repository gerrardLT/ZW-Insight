server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: zw-insight-server
  profiles:
    active: dev
  # Flyway 数据库版本管理
  flyway:
    enabled: true
    # 现有数据库表已存在，设置 baseline 避免重复执行历史脚本
    baseline-on-migrate: true
    baseline-version: '0'
    locations: classpath:db/migration
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: true
    out-of-order: false
    # 忽略历史中的失败迁移记录，允许重试
    ignore-migration-patterns: "*:failed"

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zwinsight.*.domain,com.zwinsight.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# Spring Boot Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# 系统健康监控配置
monitor:
  # 磁盘统计路径（文件系统根路径）
  disk-path: /
  # 阈值告警配置（百分比）：超过阈值记录 WARN 日志
  threshold:
    cpu: 90
    memory: 85
    disk: 90
