spring:
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zw_insight?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: zwinsight123
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: zw-insight

# KKFileView 文件预览配置
app:
  kkfileview:
    base-url: http://localhost:8012

# JWT 配置
jwt:
  secret: ZwInsight2024SecretKeyForJwtTokenGeneration
  expiration: 86400000

# 认证配置
auth:
  captcha-enabled: true
  lock-enabled: true
  lock-check-period: 300
  lock-max-attempts: 5
  lock-duration: 1800

# 短信配置
sms:
  enabled: false
  access-key-id: your-access-key-id
  access-key-secret: your-access-key-secret
  sign-name: ZW-Insight
  template-code: SMS_000000

# 日志配置
logging:
  level:
    com.zwinsight: debug
    com.baomidou.mybatisplus: debug
