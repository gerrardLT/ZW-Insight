name: CI/CD Deploy to BaoTa Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/root/zw-insight' }}

jobs:
  # ────────────────────────────────────────────────────
  # 1. 后端构建
  # ────────────────────────────────────────────────────
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: Build (skip tests)
        working-directory: zw-insight-server
        run: mvn -B clean package -Dmaven.test.skip=true

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: zw-insight-server/deploy/zw-insight-app.jar
          retention-days: 3

  # ────────────────────────────────────────────────────
  # 2. 部署到宝塔服务器
  # ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: deploy/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='**/target/' \
            --exclude='**/dist/' \
            --exclude='test-results/' \
            --exclude='.kiro/' \
            --exclude='deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/"

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}" bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          DEPLOY_DIR="${DEPLOY_DIR:-/root/zw-insight}"
          cd "$DEPLOY_DIR/deploy"

          echo "=== [1/5] 确保基础设施运行 ==="
          # 拉取最新 MySQL 镜像（升级到 8.0.37 以支持 IF NOT EXISTS 语法）
          docker compose -f docker-compose.deploy.yml pull mysql
          # 启动 MySQL/Redis/MinIO/RabbitMQ（如已运行则无操作，如镜像更新则自动重建）
          docker compose -f docker-compose.deploy.yml up -d mysql redis minio rabbitmq

          echo "=== [2/5] 等待 MySQL 就绪 ==="
          for i in $(seq 1 30); do
            if docker exec zwi-mysql mysqladmin ping -h 127.0.0.1 -uroot -pzwinsight123 --silent 2>/dev/null; then
              echo "MySQL 就绪"
              break
            fi
            echo "等待 MySQL... ($i/30)"
            sleep 3
          done

          echo "=== [3/5] 清理 Flyway 失败记录 ==="
          # 直接清理（表不存在或无记录时静默忽略）
          docker exec zwi-mysql mysql -uroot -pzwinsight123 zw_insight \
            -e "DELETE FROM flyway_schema_history WHERE success = 0;" 2>/dev/null || true

          echo "=== [4/5] 重建并启动应用容器 ==="
          # 只停止并重建 backend 和 frontend，基础设施保持运行
          docker compose -f docker-compose.deploy.yml stop backend frontend 2>/dev/null || true
          docker rm -f zwi-backend zwi-frontend 2>/dev/null || true
          docker compose -f docker-compose.deploy.yml build --no-cache backend frontend
          docker compose -f docker-compose.deploy.yml up -d backend frontend

          echo "=== [5/5] 清理旧镜像 ==="
          docker image prune -f

          echo ""
          echo "=== 部署完成 ==="
          docker compose -f docker-compose.deploy.yml ps
          DEPLOY_SCRIPT
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}

      - name: Health check
        continue-on-error: true
        run: |
          echo "等待服务启动（Spring Boot + Flyway 迁移）..."
          sleep 30
          for i in $(seq 1 15); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ env.SERVER_HOST }}:18080/api/v1/system/menu/user" || true)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "✅ 后端健康检查通过 (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "等待中... ($i/15, HTTP $HTTP_CODE)"
            sleep 10
          done
          echo "⚠️ 后端健康检查未通过，服务可能仍在启动中，请手动检查服务器日志"
          ssh -i ~/.ssh/deploy_key "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}" \
            "docker logs zwi-backend --tail 30" || true

  # ────────────────────────────────────────────────────
  # 3. 集成测试
  # ────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: deploy
    if: false   # 暂时禁用，等服务稳定后再开启
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run lifecycle test
        run: |
          scp -i ~/.ssh/deploy_key keys/lifecycle-sim.sh \
            "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim.sh"

          ssh -i ~/.ssh/deploy_key "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}" bash -s <<'TEST_SCRIPT'
          set -uo pipefail
          cd /root/zwi-deploy
          sed -i 's/\r$//' lifecycle-sim.sh
          chmod +x lifecycle-sim.sh
          bash lifecycle-sim.sh 2>&1 | tee /root/zwi-deploy/lifecycle-sim-result.log
          TEST_SCRIPT

      - name: Download test results
        if: always()
        run: |
          scp -i ~/.ssh/deploy_key \
            "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim.log" \
            ./test-results-lifecycle.log || true
          scp -i ~/.ssh/deploy_key \
            "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim-result.log" \
            ./test-results-output.log || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results-lifecycle.log
            test-results-output.log
          retention-days: 7

      - name: Test summary
        if: always()
        run: |
          echo "=== 集成测试结果 ==="
          if [ -f test-results-output.log ]; then
            echo "成功: $(grep -c '✅' test-results-output.log || echo 0)"
            echo "失败: $(grep -c '❌' test-results-output.log || echo 0)"
            if grep -q "❌" test-results-output.log; then
              echo "::error::集成测试存在失败项"
              exit 1
            fi
          else
            echo "::warning::未找到测试结果文件"
          fi
