name: CI/CD Deploy to BaoTa Server

on:
  push:
    branches: [main]
  workflow_dispatch:   # 支持手动触发

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/root/zw-insight' }}

jobs:
  # ────────────────────────────────────────────────────
  # 1. 后端构建 + 测试
  # ────────────────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: Build & Test
        working-directory: zw-insight-server
        run: mvn -B -fae clean package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: zw-insight-server/deploy/zw-insight-app.jar
          retention-days: 3

  # ────────────────────────────────────────────────────
  # 2. 部署到宝塔服务器
  # ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: zw-insight-server/deploy/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # 同步项目文件到服务器（排除 node_modules、target、.git 等大目录）
      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='**/target/' \
            --exclude='**/dist/' \
            --exclude='test-results/' \
            --exclude='.kiro/' \
            --exclude='zw-insight-web/dist/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/"

      # SSH 到服务器执行部署
      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail
          cd "${DEPLOY_DIR:-/root/zw-insight}"

          echo "=== [1/4] 准备部署目录 ==="
          mkdir -p deploy

          echo "=== [2/4] 构建 Docker 镜像 ==="
          cd deploy
          docker compose -f docker-compose.deploy.yml build --no-cache

          echo "=== [3/4] 滚动更新容器 ==="
          docker compose -f docker-compose.deploy.yml up -d --remove-orphans

          echo "=== [4/4] 清理旧镜像 ==="
          docker image prune -f

          echo ""
          echo "=== 部署完成 ==="
          docker compose -f docker-compose.deploy.yml ps
          DEPLOY_SCRIPT
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}

      - name: Health check
        run: |
          echo "等待服务启动..."
          sleep 15
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ env.SERVER_HOST }}:18080/api/v1/system/menu/user" || true)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "后端健康检查通过 (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "等待中... ($i/10, HTTP $HTTP_CODE)"
            sleep 10
          done
          echo "::warning::后端健康检查未通过，请检查服务器日志"
          exit 1

  # ────────────────────────────────────────────────────
  # 3. 集成测试（部署后自动执行）
  # ────────────────────────────────────────────────────
  integration-test:
    name: Integration Test (Lifecycle Sim)
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload and run lifecycle test
        run: |
          # 上传测试脚本
          scp -i ~/.ssh/deploy_key keys/lifecycle-sim.sh \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim.sh

          # 修复换行 + 赋权 + 执行
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} bash -s <<'TEST_SCRIPT'
          set -uo pipefail
          cd /root/zwi-deploy
          sed -i 's/\r$//' lifecycle-sim.sh
          chmod +x lifecycle-sim.sh
          bash lifecycle-sim.sh 2>&1 | tee /root/zwi-deploy/lifecycle-sim-result.log
          TEST_SCRIPT

      - name: Download test results
        if: always()
        run: |
          scp -i ~/.ssh/deploy_key \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim.log \
            ./test-results-lifecycle.log || true
          scp -i ~/.ssh/deploy_key \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/root/zwi-deploy/lifecycle-sim-result.log \
            ./test-results-output.log || true

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results-lifecycle.log
            test-results-output.log
          retention-days: 7

      - name: Show test summary
        if: always()
        run: |
          echo "=== 集成测试结果摘要 ==="
          if [ -f test-results-output.log ]; then
            echo ""
            echo "--- 成功项 ---"
            grep -c "✅" test-results-output.log || echo "0"
            echo ""
            echo "--- 失败项 ---"
            grep "❌" test-results-output.log || echo "无失败"
            echo ""
            echo "--- 警告项 ---"
            grep "⚠️" test-results-output.log || echo "无警告"
            echo ""
            # 如果有失败则报错
            if grep -q "❌" test-results-output.log; then
              echo "::error::集成测试存在失败项，请查看 Artifact 中的详细日志"
              exit 1
            fi
          else
            echo "::warning::未找到测试结果文件"
          fi
