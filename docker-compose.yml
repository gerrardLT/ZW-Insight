version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: zw-insight-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: zwinsight123
      MYSQL_DATABASE: zw_insight
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - zw-insight-net

  redis:
    image: redis:7
    container_name: zw-insight-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - zw-insight-net

  minio:
    image: minio/minio
    container_name: zw-insight-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - zw-insight-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: zw-insight-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - zw-insight-net

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:

networks:
  zw-insight-net:
    driver: bridge
